<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Blocker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Feed Blocker</h1>
    <div class="toggle-group">
      <div class="toggle-item">
        <label for="twitter-toggle">
          <span class="site-name">Twitter / X</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="twitter-toggle">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-item">
        <label for="linkedin-toggle">
          <span class="site-name">LinkedIn</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="linkedin-toggle">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-item">
        <label for="youtube-toggle">
          <span class="site-name">YouTube</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="youtube-toggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
